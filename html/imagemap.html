<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imagemape</title>

</head>
<body>
    <h1> This is the picture of the mountain.</h1>
    <figure>
        <picture>
        <source srcset="../image/pexels-photo-1118861.webp" alt="This mountain."/>
        <img src="../image/pexels-photo-1118861.jpg" usemap="#image-map">
        </picture>

        <figcaption>Mountain image, Image used:
           <br>CC0 1.0 Universal by Johannes Plenio URL: https://www.pexels.com/photo/landscape-photography-of-mountains-1118861/
        </figcaption>
    </figure>

<map name="image-map">
    <area target="" alt="house" title="house" href="https://www.airbnb.com" coords="1204,868,1102,821" shape="rect">
    <area target="" alt="mountain" title="mountain" href="https://en.wikipedia.org/wiki/Mountain" coords="515,643,94" shape="circle">
    <area target="" alt="trees" title="trees" href="https://www.amazon.com" coords="1474,753,1537,730,1682,782,1620,847,1524,849,1476,822,1458,792" shape="poly">
</map>

    
</body>
</html>
